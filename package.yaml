name:                sol
version:             0.1.0.0
github:              "hyperswine/sol"
license:             BSD-3-Clause
author:              "Jasen Qin"
maintainer:          "jasen.qin33@gmail.com.com"
copyright:           "2026 Jasen Qin"

extra-source-files:
- README.md
- CHANGELOG.md

description:         Please see the README on GitHub at <https://github.com/hyperswine/sol#readme>

dependencies:
- base >= 4.7 && < 5
- containers
- megaparsec
- parser-combinators
- process
- directory
- filepath
- haskeline

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  exposed-modules:
  - Lib
  - Sol.Syntax
  - Sol.Value
  - Sol.Parser
  - Sol.Eval

executables:
  sol-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - sol

tests:
  sol-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - sol
